  statement_tex: |
    设
    \[
      f(x)=\begin{cases}
      ax+1, & x<1,\\
      x^2+b, & x\ge 1.
      \end{cases}
    \]
    若 $f$ 在 $x=1$ 处连续，求 $a,b$ 的关系。
  solution_tex: |
    连续要求左极限、右极限与函数值一致。由
    \[
      \lim_{x\to1^-}(ax+1)=a+1,\qquad f(1)=1+b
    \]
    得 $a+1=1+b$，即 $a=b$。
  answer: "$a=b$"
  estimated_time_minutes: 4
  score: 6
  related_notes:
    - tex/main.tex
- id: calc-cont-002
