  style_tags:
    - 存在性证明
    - 辅助函数
  statement_tex: |
    设 $f$ 在 $[0,1]$ 上连续，且 $f(0)<0<f(1)$。证明存在 $\xi\in(0,1)$，使得 $f(\xi)=0$。
  solution_tex: |
    由介值定理，$0$ 介于 $f(0)$ 与 $f(1)$ 之间，因此存在 $\xi\in(0,1)$ 使 $f(\xi)=0$。
  answer: 存在
  estimated_time_minutes: 5
  score: 8
